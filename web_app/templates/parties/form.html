{% extends "base.html" %}
{% block title %}{% if row %}거래처 수정{% else %}거래처 신규{% endif %}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4 text-slate-800">{% if row %}거래처 수정{% else %}거래처 신규 등록{% endif %}</h1>
<form method="post" action="{% if row %}/parties/{{ row.code }}{% else %}/parties{% endif %}" class="card max-w-2xl">
  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="text-sm font-medium text-slate-700">거래처코드 *</label>
      {% if row %}
      <input type="text" class="input bg-slate-100" readonly value="{{ row.code }}">
      {% else %}
      <input type="text" name="code" class="input" required value="{{ next_code }}">
      {% endif %}
    </div>
    <div>
      <label class="text-sm font-medium text-slate-700">거래처명 *</label>
      <input type="text" name="name" class="input" required value="{{ row.name if row else '' }}">
    </div>
    <div>
      <label class="text-sm font-medium text-slate-700">사업자번호</label>
      <input type="text" name="biz_no" class="input" value="{{ row.biz_no if row else '' }}">
    </div>
    <div>
      <label class="text-sm font-medium text-slate-700">구분</label>
      <select name="category" class="select">
        {% set cat = row.category if row else '' %}
        <option value="">선택</option>
        {% for c in ['병원', '대리점', '공급사', '영상센터', '교육/연구', '금융', '법인기타', '기타'] %}<option value="{{ c }}" {% if cat == c %}selected{% endif %}>{{ c }}</option>{% endfor %}
      </select>
    </div>
    <div>
      <label class="text-sm font-medium text-slate-700">주거래 제품</label>
      <input type="text" name="main_product" class="input" value="{{ row.main_product if row else '' }}">
    </div>
    <div>
      <label class="text-sm font-medium text-slate-700">활성</label>
      <select name="active" class="select">
        <option value="Y" {% if row and row.active == 'Y' or not row %}selected{% endif %}>활성</option>
        <option value="N" {% if row and row.active == 'N' %}selected{% endif %}>비활성</option>
      </select>
    </div>
    <div>
      <label class="text-sm font-medium text-slate-700">담당자</label>
      <input type="text" name="contact_person" class="input" value="{{ row.contact_person if row else '' }}">
    </div>
    <div>
      <label class="text-sm font-medium text-slate-700">연락처</label>
      <input type="text" name="phone" class="input" value="{{ row.phone if row else '' }}">
    </div>
    <div class="col-span-2">
      <label class="text-sm font-medium text-slate-700">비고</label>
      <textarea name="note" class="textarea" rows="2">{{ row.note if row else '' }}</textarea>
    </div>
  </div>
  <div class="flex gap-2 mt-6">
    <button class="btn btn-primary">{% if row %}수정{% else %}등록{% endif %}</button>
    <a href="/parties" class="btn btn-secondary">취소</a>
  </div>
</form>
{% endblock %}
