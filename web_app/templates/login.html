{% extends "base.html" %}
{% block title %}로그인 — 인비즈 경영관리{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center" style="background: linear-gradient(135deg, #F5EDFA 0%, #FFE9D6 100%);">
  <div class="card w-96" style="border-top: 4px solid var(--inviz-orange);">
    <div class="flex justify-center mb-4">
      <img src="/static/img/inviz_logo.png" alt="Inviz" style="height:72px; width:auto; max-width:280px;"
           onerror="this.onerror=null; this.src='/static/img/inviz_logo.svg';">
    </div>
    <h1 class="text-xl font-bold mb-1 text-center" style="color: var(--inviz-purple);">경영관리 시스템</h1>
    <p class="text-sm text-slate-500 mb-6 text-center">사내 공동 비밀번호로 접속하세요.</p>
    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">비밀번호</label>
        <input type="password" name="password" class="input" autofocus required>
      </div>
      {% if error %}
      <div class="text-sm text-red-600">비밀번호가 일치하지 않습니다.</div>
      {% endif %}
      <button type="submit" class="btn btn-primary w-full">로그인</button>
    </form>
  </div>
</div>
{% endblock %}
